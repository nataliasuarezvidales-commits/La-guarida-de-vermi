  <script>

     // CHECKBOXES
const checkboxes = document.querySelectorAll('.checkbox-item input');
const tagsContainer = document.getElementById('tagsContainer');

// ARRAY DE FILTROS
let selectedFilters = [];

// EVENTO CHECKBOX
checkboxes.forEach((checkbox) => {

  checkbox.addEventListener('change', () => {

    const value = checkbox.value;

    if(checkbox.checked){

      selectedFilters.push(value);

    } else {

      selectedFilters = selectedFilters.filter(item => item !== value);

    }

    renderTags();

  });

});

// RENDERIZAR TAGS
function renderTags(){

  tagsContainer.innerHTML = '';

  selectedFilters.forEach((filter) => {

    const tag = document.createElement('div');
    tag.classList.add('tag');

    tag.innerHTML = `
      <span>${filter}</span>
      <button onclick="removeFilter('${filter}')">
        ×
      </button>
    `;

    tagsContainer.appendChild(tag);

  });

}

// ELIMINAR TAG
function removeFilter(filter){

  // ELIMINAR DEL ARRAY
  selectedFilters = selectedFilters.filter(item => item !== filter);

  // DESMARCAR CHECKBOX
  checkboxes.forEach((checkbox) => {

    if(checkbox.value === filter){
      checkbox.checked = false;
    }

  });

  renderTags();

}

// Código del carrito
        const addToCartBtn = document.getElementById("addToCartBtn");
        // ...

        // Código del thumbnail activo
        const carousel = document.getElementById("productCarousel");
        const thumbnails = document.querySelectorAll(".thumb-img");

        carousel.addEventListener("slid.bs.carousel", function (event) {

            thumbnails.forEach(thumb => {
                thumb.classList.remove("active-thumb");
            });

            thumbnails[event.to].classList.add("active-thumb");

        });

  </script>
