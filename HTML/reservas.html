  <section class="reservation-section py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-lg-8">

                <!-- Título -->
                <h2 class="text-center fw-bold mb-5">
                    Haz tu reserva
                </h2>

                <!-- Formulario -->
                <form id="formReserva" novalidate>

                    <!-- Nombre -->
                    <div class="mb-3">
                       <input type="text" 
                              class="form-control custom-input" 
                              id="name" 
                              placeholder="Nombre" required>
                        <div class="invalid-feedback">
                          Ingresa tu nombre
                        </div>
                    </div>

                    <!-- Correo y Celular -->
                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <input type="email"
                                   class="form-control custom-input"
                                   placeholder="Correo" 
                                   id="email"
                                   required>
                            <div class="invalid-feedback">
                              Ingresa un correo válido
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="tel"
                                   class="form-control custom-input"
                                   placeholder="Celular"
                                   id="phone"
                                   required>
                            <div class="invalid-feedback">
                              Ingresa un número de celular válido
                            </div>
                        </div>

                    </div>

                    <!-- Actividad y Personas -->
                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <input type="text"
                                   class="form-control custom-input"
                                   placeholder="Tipo de actividad">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="number"
                                   class="form-control custom-input"
                                   placeholder="Cuantas personas">
                        </div>

                    </div>

                    <!-- Fecha y Hora -->
                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <input type="date"
                                   class="form-control custom-input">
                        </div>

                        <div class="col-md-6 mb-3">
                            <input type="time"
                                   class="form-control custom-input">
                        </div>

                    </div>

                    <!-- Tiempo -->
                    <div class="mb-4">
                        <input type="text"
                               class="form-control custom-input"
                               placeholder="Tiempo aproximado">
                    </div>

                    <!-- Botón -->
                    <div class="text-center">
                        <button type="submit"
                                class="btn reservation-btn px-5">
                            Enviar
                        </button>
                    </div>

                </form>

            </div>

        </div>

    </div>

<!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

    const formulario = document.getElementById("formReserva");

    // Validación mientras escribe
    formulario.querySelectorAll("input, select, textarea").forEach(campo => {

        campo.addEventListener("input", () => {

            if (campo.checkValidity()) {
                campo.classList.remove("is-invalid");
                campo.classList.add("is-valid");
            } else {
                campo.classList.remove("is-valid");
                campo.classList.add("is-invalid");
            }

        });

    });

    // Validación al enviar
    formulario.addEventListener("submit", function(e) {

        e.preventDefault();

        let valido = true;

        formulario.querySelectorAll("input, select, textarea").forEach(campo => {

            if (campo.checkValidity()) {
                campo.classList.remove("is-invalid");
                campo.classList.add("is-valid");
            } else {
                campo.classList.remove("is-valid");
                campo.classList.add("is-invalid");
                valido = false;
            }

        });

        if (valido) {
            alert("Formulario enviado correctamente");
            // Aquí puedes enviar los datos
        }

    });

});
  </script>
